<!DOCTYPE html>
<html>
<head>
    <title>Tarun AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: white;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links a {
            color: #94a3b8;
            margin: 0 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: white;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-top: 120px;
            position: relative;
        }

        .main-title {
            font-size: 70px;
            font-weight: 800;
            background: linear-gradient(90deg, #00f5ff, #00ff9d, #38bdf8);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        .subtitle {
            margin-top: 20px;
            font-size: 20px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        .buttons {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-primary {
            padding: 15px 35px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(90deg, #00f5ff, #00ff9d);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: scale(1.07);
            box-shadow: 0 0 25px #00f5ff;
        }

        .btn-secondary {
            padding: 15px 35px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Glow */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,255,255,0.15), transparent 70%);
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            filter: blur(80px);
            z-index: -1;
        }

        /* Feature Cards */
        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 120px;
            padding-bottom: 80px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            width: 240px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(0,255,255,0.4);
        }

        @media (max-width: 768px) {
            .features {
                flex-direction: column;
                align-items: center;
            }

            .main-title {
                font-size: 45px;
            }
        }

    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">🚀 Tarun AI</div>
        <div class="nav-links">
            <a href="#">Overview</a>
            <a href="#">Technology</a>
            <a href="#">Features</a>
            <a href="#">Resources</a>
        </div>
    </div>

    <div class="hero">
        <div class="glow"></div>

        <h1 class="main-title">Tarun AI</h1>

        <p class="subtitle">
            Next Generation Intelligent AI Assistant <br>
            Built for Speed • Security • Innovation
        </p>

        <div class="buttons">
            <button class="btn-primary" onclick="window.location.href='/chat'">
                🚀 Launch AI
            </button>

            <button class="btn-secondary">
                Learn More
            </button>
        </div>
    </div>

    <div class="features">
        <div class="card">⚡ Lightning Fast AI</div>
        <div class="card">🔐 Enterprise Security</div>
        <div class="card">🤖 Smart Document AI</div>
    </div>

</body>
</html>
